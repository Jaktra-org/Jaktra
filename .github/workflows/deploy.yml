name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip CI tests"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}

jobs:

  test:
    if: ${{ !inputs.skip_tests }}
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build-backend:
    needs: [test]
    if: ${{ needs.test.result == 'success' || needs.test.result == 'skipped' }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names jaktra/base/backend || \
          aws ecr create-repository --repository-name jaktra/base/backend --image-scanning-configuration scanOnPush=true

      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.ecr.outputs.registry }}/jaktra/base/backend:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/jaktra/base/backend:latest

  build-ai-service:
    needs: [test]
    if: ${{ needs.test.result == 'success' || needs.test.result == 'skipped' }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names jaktra/base/ai-service || \
          aws ecr create-repository --repository-name jaktra/base/ai-service --image-scanning-configuration scanOnPush=true

      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.ecr.outputs.registry }}/jaktra/base/ai-service:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/jaktra/base/ai-service:latest

  build-frontend:
    needs: [test]
    if: ${{ needs.test.result == 'success' || needs.test.result == 'skipped' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        working-directory: frontend
        run: |
          BUCKET="${{ secrets.FRONTEND_S3_BUCKET || 'jaktra-base-frontend' }}"
          aws s3 sync dist/ "s3://${BUCKET}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html "s3://${BUCKET}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"

  deploy-backend:
    needs: [build-backend]
    runs-on: ubuntu-latest
    outputs:
      prev_task_def: ${{ steps.prev.outputs.task_def }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Save current task definition for rollback
        id: prev
        run: |
          PREV=$(aws ecs describe-services \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --services "${{ secrets.BACKEND_SERVICE_NAME }}" \
            --query 'services[0].taskDefinition' --output text)
          echo "task_def=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Register new task definition
        id: task
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${{ secrets.BACKEND_TASK_FAMILY }}" \
            --query 'taskDefinition' --output json)

          NEW_TASK=$(echo "$TASK_DEF" \
            | jq --arg img "${{ secrets.ECR_BACKEND_REPO_URL }}:${{ needs.build-backend.outputs.image_tag }}" \
              '.containerDefinitions[0].image = $img
               | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                     .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

          ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=${ARN}" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --service "${{ secrets.BACKEND_SERVICE_NAME }}" \
            --task-definition "${{ steps.task.outputs.arn }}" \
            --force-new-deployment \
            --no-cli-pager > /dev/null

      - name: Wait for stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --services "${{ secrets.BACKEND_SERVICE_NAME }}"

  deploy-ai-service:
    needs: [build-ai-service]
    runs-on: ubuntu-latest
    outputs:
      prev_task_def: ${{ steps.prev.outputs.task_def }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Save current task definition for rollback
        id: prev
        run: |
          PREV=$(aws ecs describe-services \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --services "${{ secrets.AI_SERVICE_SERVICE_NAME }}" \
            --query 'services[0].taskDefinition' --output text)
          echo "task_def=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Register new task definition
        id: task
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${{ secrets.AI_SERVICE_TASK_FAMILY }}" \
            --query 'taskDefinition' --output json)

          NEW_TASK=$(echo "$TASK_DEF" \
            | jq --arg img "${{ secrets.ECR_AI_SERVICE_REPO_URL }}:${{ needs.build-ai-service.outputs.image_tag }}" \
              '.containerDefinitions[0].image = $img
               | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                     .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

          ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=${ARN}" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --service "${{ secrets.AI_SERVICE_SERVICE_NAME }}" \
            --task-definition "${{ steps.task.outputs.arn }}" \
            --force-new-deployment \
            --no-cli-pager > /dev/null

      - name: Wait for stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --services "${{ secrets.AI_SERVICE_SERVICE_NAME }}"

  smoke-test:
    needs: [deploy-backend, deploy-ai-service, build-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Health check — Backend
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_API_BASE_URL }}/api/health" || echo "000")
          echo "Backend health: ${STATUS}"
          [[ "$STATUS" == "200" ]] || exit 1

      - name: Health check — Frontend
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://$(echo '${{ secrets.VITE_API_BASE_URL }}' | sed 's|https\?://||')" || echo "000")
          echo "Frontend: ${STATUS}"

  rollback:
    needs: [smoke-test, deploy-backend, deploy-ai-service]
    if: ${{ failure() && needs.smoke-test.result == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback backend
        if: ${{ needs.deploy-backend.outputs.prev_task_def != '' }}
        run: |
          echo "Rolling back backend to: ${{ needs.deploy-backend.outputs.prev_task_def }}"
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --service "${{ secrets.BACKEND_SERVICE_NAME }}" \
            --task-definition "${{ needs.deploy-backend.outputs.prev_task_def }}" \
            --force-new-deployment \
            --no-cli-pager > /dev/null

      - name: Rollback ai-service
        if: ${{ needs.deploy-ai-service.outputs.prev_task_def != '' }}
        run: |
          echo "Rolling back ai-service to: ${{ needs.deploy-ai-service.outputs.prev_task_def }}"
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --service "${{ secrets.AI_SERVICE_SERVICE_NAME }}" \
            --task-definition "${{ needs.deploy-ai-service.outputs.prev_task_def }}" \
            --force-new-deployment \
            --no-cli-pager > /dev/null

      - name: Wait for rollback stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --services "${{ secrets.BACKEND_SERVICE_NAME }}" "${{ secrets.AI_SERVICE_SERVICE_NAME }}"
