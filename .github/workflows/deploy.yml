name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip CI tests"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}

jobs:

  test:
    if: ${{ !inputs.skip_tests }}
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build-backend:
    needs: [test]
    if: ${{ needs.test.result == 'success' || needs.test.result == 'skipped' }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names jaktra/base/backend || \
          aws ecr create-repository --repository-name jaktra/base/backend --image-scanning-configuration scanOnPush=true

      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend to ECR
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.ecr.outputs.registry }}/jaktra/base/backend:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/jaktra/base/backend:latest

  build-ai-service:
    needs: [test]
    if: ${{ needs.test.result == 'success' || needs.test.result == 'skipped' }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names jaktra/base/ai-service || \
          aws ecr create-repository --repository-name jaktra/base/ai-service --image-scanning-configuration scanOnPush=true

      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push AI service to ECR
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.ecr.outputs.registry }}/jaktra/base/ai-service:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/jaktra/base/ai-service:latest

  deploy-frontend:
    needs: [test]
    if: ${{ needs.test.result == 'success' || needs.test.result == 'skipped' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        working-directory: frontend
        run: |
          BUCKET="${{ secrets.FRONTEND_S3_BUCKET || 'jaktra-base-frontend' }}"
          aws s3 sync dist/ "s3://${BUCKET}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html "s3://${BUCKET}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          DIST_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          if [ -z "$DIST_ID" ] || [ "$DIST_ID" == "null" ]; then
            DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[0].Id" --output text 2>/dev/null || echo "")
          fi
          if [ -n "$DIST_ID" ]; then
            echo "Invalidating CloudFront CDN cache..."
            aws cloudfront create-invalidation --distribution-id "${DIST_ID}" --paths "/*"
          fi

  trigger-active-deployments:
    needs: [build-backend, build-ai-service, deploy-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Detect active environment and trigger pull
        run: |
          # 1. Detect Production ECS Cluster
          ECS_STATUS=$(aws ecs describe-services --cluster jaktra-production --services jaktra-production-backend --query 'services[0].status' --output text 2>/dev/null || echo "INACTIVE")
          if [ "$ECS_STATUS" == "ACTIVE" ]; then
            echo "⚡ Active ECS Production Cluster detected! Triggering rolling container update..."
            aws ecs update-service --cluster jaktra-production --service jaktra-production-backend --force-new-deployment --no-cli-pager || true
            aws ecs update-service --cluster jaktra-production --service jaktra-production-ai-service --force-new-deployment --no-cli-pager || true
          else
            echo "ℹ️ No active ECS Production cluster running."
          fi

          # 2. Detect Dev EC2 Instance
          EC2_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=jaktra-dev-ec2,jaktra-dev-instance" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" --output text 2>/dev/null || echo "None")

          if [ "$EC2_ID" != "None" ] && [ -n "$EC2_ID" ]; then
            echo "⚡ Active Dev EC2 Instance ($EC2_ID) detected! Triggering docker pull via AWS SSM..."
            aws ssm send-command \
              --instance-ids "$EC2_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["cd /app && docker compose pull && docker compose up -d"]' || true
          else
            echo "ℹ️ No active Dev EC2 instance running."
          fi
