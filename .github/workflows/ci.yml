name: Jaktra CI

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: jaktra
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run database migrations/push schema
        run: npx drizzle-kit push
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'mysql://root:rootpassword@127.0.0.1:3306/jaktra' }}

      - name: Type-check
        run: npm run type-check
        working-directory: backend

      - name: Lint
        run: npm run lint
        working-directory: backend

      - name: Run backend tests
        run: npm run test:run
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'mysql://root:rootpassword@127.0.0.1:3306/jaktra' }}
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET || 'dev-secret-key-at-least-32-chars-long' }}

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck / Build
        run: npm run build
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Run Vitest Unit/Component Tests
        run: npm run test
        working-directory: frontend

      - name: Install E2E Dependencies
        run: npm ci
        working-directory: tests/e2e

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
        working-directory: tests/e2e

      - name: Run Playwright E2E Tests
        run: npm run test
        working-directory: tests/e2e

  ai-service-ci:
    name: AI Service CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio anyio joblib scikit-learn
          pip install -r requirements.txt
        working-directory: ai-service

      - name: Run tests
        run: python -m pytest test/ -v
        working-directory: ai-service
        env:
          PYTHONPATH: .
          ENVIRONMENT: development
          SERVICE_KEY: test-service-key
          LLM_API_KEY: test-llm-api-key

